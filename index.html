<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Smartphone Video Masterclass</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f5f7fb; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .card { 
            background: white; 
            padding: 45px 25px; 
            border-radius: 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
            text-align: center; 
            max-width: 420px; 
            width: 100%; 
            border: 1px solid #eaf0f7; 
        }
        h1 { 
            color: #1a60eb; 
            font-size: 26px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-top: 0;
            margin-bottom: 12px; 
            line-height: 1.3; 
            letter-spacing: -0.5px;
        }
        .slots { 
            color: #4385f5; 
            font-size: 18px; 
            font-weight: 700; 
            margin-bottom: 30px; 
        }
        .info-box { 
            background-color: #f0f5ff; 
            border: 2px solid #cfe0ff; 
            color: #1a60eb; 
            padding: 18px; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 16px; 
            margin-bottom: 35px; 
        }
        .arrow { 
            color: #1a60eb; 
            font-size: 36px; 
            animation: bounce 2s infinite; 
            margin-bottom: 25px; 
        }
        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 
            40% { transform: translateY(-12px); } 
            60% { transform: translateY(-6px); } 
        }
        p.instruction { 
            color: #334155; 
            font-size: 16px; 
            font-weight: 600; 
            margin-bottom: 25px; 
        }
        .btn { 
            display: block; 
            background: linear-gradient(135deg, #1a60eb, #0040c7); 
            color: white; 
            text-decoration: none; 
            padding: 18px 20px; 
            font-size: 18px; 
            font-weight: 800; 
            border-radius: 14px; 
            text-transform: uppercase; 
            box-shadow: 0 6px 20px rgba(26,96,235,0.35); 
            transition: all 0.2s; 
        }
        .btn:active { 
            transform: scale(0.97); 
        }
        .notification { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%) translateY(120px); 
            background: #111827; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 50px; 
            font-weight: 600; 
            font-size: 14px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.25); 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            z-index: 1000; 
            width: max-content; 
        }
        .notification.show { 
            transform: translateX(-50%) translateY(0); 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Free 4 Days Smartphone Video & Animation Masterclass</h1>
        <div class="slots">Few Slots Available</div>
        <div class="info-box">All You Need is Your Smartphone and Internet Connection</div>
        <div class="arrow">▼</div>
        <p class="instruction">Click the button below to join the FREE class now</p>
        <a href="https://chat.whatsapp.com/GZxoHtY30Z2Jc0CQtyajRx?s=sh&p=a&mlu=4" class="btn">Click Here To Join Now</a>
    </div>

    <div id="popup" class="notification">🔥 <span id="popup-text">Someone just joined</span></div>

    <script>
        const names = [
            "Ibrahim from Kano", "Chinedu from Enugu", "Blessing from Benin", 
            "Aminu from Kaduna", "Aisha from Abuja", "Tunde from Lagos", 
            "Emeka from Asaba", "Gift from Port Harcourt", "Yusuf from Ilorin",
            "Chioma from Owerri", "Funmi from Ibadan", "Musa from Sokoto"
        ];
        
        const popup = document.getElementById('popup');
        const popupText = document.getElementById('popup-text');
        
        function showNotification() {
            const randomName = names[Math.floor(Math.random() * names.length)];
            popupText.innerText = randomName + " just joined";
            popup.classList.add('show');
            
            setTimeout(() => { 
                popup.classList.remove('show'); 
            }, 3500);
        }
        
        setInterval(showNotification, 8000);
        setTimeout(showNotification, 2500);
    </script>

</body>
</html>

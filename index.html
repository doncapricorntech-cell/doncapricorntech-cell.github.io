<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free 4 Days Smartphone Video To Income Masterclass</title>
    <style>
        /* Creative Premium Cinematic Background */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-x: hidden;
        }

        /* Modern Glassmorphism Container Card */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 40px 25px; 
            border-radius: 30px; 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255,255,255,0.1); 
            text-align: center; 
            max-width: 420px; 
            width: 100%; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* Eye-Catching Floating Smartphone Animation */
        .phone-animation {
            width: 55px;
            height: 100px;
            border: 3px solid #38bdf8;
            border-radius: 14px;
            margin: 0 auto 25px auto;
            position: relative;
            animation: floatPhone 3.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phone-screen {
            width: 90%;
            height: 92%;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .phone-screen::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            top: 4px;
            border-radius: 10px;
        }
        .play-icon {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #ffffff;
            margin-left: 4px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            animation: pulsePlay 1.2s infinite alternate;
        }

        @keyframes floatPhone {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(4deg); }
        }
        @keyframes pulsePlay {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Beautiful Neon Typography */
        h1 { 
            color: #ffffff; 
            font-size: 25px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-top: 0;
            margin-bottom: 10px; 
            line-height: 1.3; 
            letter-spacing: -0.3px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.1);
        }

        .slots { 
            color: #38bdf8; 
            font-size: 16px; 
            font-weight: 700; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Upgraded Glowing Info Box */
        .info-box { 
            background: rgba(56, 189, 248, 0.06); 
            border: 1px solid rgba(56, 189, 248, 0.25); 
            color: #38bdf8; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 15px; 
            margin-bottom: 30px; 
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.05);
        }

        .arrow { 
            color: #6366f1; 
            font-size: 28px; 
            animation: bounce 2s infinite; 
            margin-bottom: 20px; 
        }

        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 
            40% { transform: translateY(-10px); } 
            60% { transform: translateY(-5px); } 
        }

        p.instruction { 
            color: #94a3b8; 
            font-size: 15px; 
            font-weight: 600; 
            margin-bottom: 25px; 
        }

        /* High-Converting Vibrant Blue Button */
        .btn { 
            display: block; 
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); 
            color: white; 
            text-decoration: none; 
            padding: 18px 20px; 
            font-size: 18px; 
            font-weight: 800; 
            border-radius: 16px; 
            text-transform: uppercase; 
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); 
            transition: all 0.2s ease; 
            letter-spacing: 0.5px;
        }

        .btn:active { 
            transform: scale(0.96); 
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }

        /* Premium Social Proof Popup Widget */
        .notification { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%) translateY(150px); 
            background: #ffffff; 
            color: #0f172a; 
            padding: 14px 28px; 
            border-radius: 50px; 
            font-weight: 700; 
            font-size: 14px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            z-index: 1000; 
            width: max-content; 
            border: 1px solid rgba(0,0,0,0.05);
        }
        .notification.show { 
            transform: translateX(-50%) translateY(0); 
        }
        .notification span {
            color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Floating Phone Graphic Animation -->
        <div class="phone-animation">
            <div class="phone-screen">
                <div class="play-icon"></div>
            </div>
        </div>

        <h1>Free 4 Days Smartphone Video To Income Masterclass</h1>
        <div class="slots">Few Slots Available</div>
        <div class="info-box">All You Need is Your Smartphone and Internet Connection</div>
        <div class="arrow">▼</div>
        <p class="instruction">Click the button below to join the FREE class now</p>
        <a href="https://chat.whatsapp.com/GZxoHtY30Z2Jc0CQtyajRx?s=sh&p=a&mlu=4" class="btn">Click Here To Join Now</a>
    </div>

    <!-- Live Social Proof Notifications Loop -->
    <div id="popup" class="notification">🔥 <span id="popup-text">Someone from Lagos</span>&nbsp;just joined</div>

    <script>
        const names = [
            "Ibrahim from Kano", "Chinedu from Enugu", "Blessing from Benin", 
            "Aminu from Kaduna", "Aisha from Abuja", "Tunde from Lagos", 
            "Emeka from Asaba", "Gift from Port Harcourt", "Yusuf from Ilorin",
            "Chioma from Owerri", "Funmi from Ibadan", "Musa from Sokoto"
        ];
        
        const popup = document.getElementById('popup');
        const popupText = document.getElementById('popup-text');
        
        function showNotification() {
            const randomName = names[Math.floor(Math.random() * names.length)];
            popupText.innerText = randomName;
            popup.classList.add('show');
            
            setTimeout(() => { 
                popup.classList.remove('show'); 
            }, 3500);
        }
        
        setInterval(showNotification, 8500);
        setTimeout(showNotification, 2000);
    </script>

</body>
</html>
